name: Daily Stock Screening
on:
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas requests openpyxl xlrd anthropic python-dotenv
      - name: Get day of week
        id: get-day
        run: echo "day=$(LC_TIME=C date -u +%A)" >> $GITHUB_OUTPUT
      - name: Run screening
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SKIP_AI: ${{ contains(fromJSON('["Monday","Thursday"]'), steps.get-day.outputs.day) && 'false' || 'true' }}
        run: python screening.py
      - name: Run IR review
        if: ${{ contains(fromJSON('["Monday","Thursday"]'), steps.get-day.outputs.day) }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ir_review_growth.py --results-dir .
      - name: Copy result to public
        run: |
          mkdir -p public
          RESULT_COUNT=$(python -c "import json;f=open('screening_result.json','r',encoding='utf-8');d=json.load(f);print(len(d.get('stocks', d.get('results',[])) if isinstance(d,dict) else d))" 2>/dev/null || echo "0")
          echo "Screening results count: $RESULT_COUNT"
          if [ "$RESULT_COUNT" -gt "10" ]; then
            cp screening_result.json public/screening_result.json
            echo "Results copied to public/"
          else
            echo "WARNING: Results count ($RESULT_COUNT) is too low. Skipping copy to prevent empty data deployment."
            echo "Keeping existing public/screening_result.json"
          fi
          if [ -f screening_result_finance.json ]; then
            FIN_COUNT=$(python -c "import json;f=open('screening_result_finance.json','r',encoding='utf-8');d=json.load(f);print(len(d.get('stocks', d.get('results',[])) if isinstance(d,dict) else d))" 2>/dev/null || echo "0")
            echo "Finance results count: $FIN_COUNT"
            if [ "$FIN_COUNT" -gt "10" ]; then
              cp screening_result_finance.json public/screening_result_finance.json
              echo "Finance results copied to public/"
            else
              echo "WARNING: Finance results count ($FIN_COUNT) is too low. Skipping copy."
            fi
          fi
      - name: Run LINE notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN_GROWTH: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN_GROWTH }}
        run: python line_notify_growth.py --results-dir .
      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git add screening_result.json public/screening_result.json
          git add -f screening_result_finance.json public/screening_result_finance.json 2>/dev/null || true
          git add -f ai_cache.json 2>/dev/null || true
          git add -f price_history.json 2>/dev/null || true
          git add -f ir_review_growth_cache.json 2>/dev/null || true
          git add -f screening_result_prev.json 2>/dev/null || true
          git add -f screening_result_finance_prev.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update screening result $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
