name: Daily Stock Screening

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 月〜金 JST21:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests openpyxl xlrd anthropic python-dotenv

      - name: Run screening
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python screening.py

      - name: Copy result to public
        run: cp screening_result.json screening-ui/public/screening_result.json

      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git add screening_result.json screening-ui/public/screening_result.json
          git diff --staged --quiet || git commit -m "update screening result $(date +'%Y-%m-%d')"
          git push
