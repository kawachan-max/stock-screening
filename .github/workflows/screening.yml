name: Daily Stock Screening

on:
  schedule:
    - cron: '0 12 * * 1-5' # Mon-Fri UTC 12:00 (data daily; AI Mon & Thu only)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests openpyxl xlrd anthropic python-dotenv

      - name: Get day of week
        id: get-day
        run: echo "day=$(date -u +%A)" >> $GITHUB_OUTPUT

      - name: Run screening
        working-directory: screening-ui
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKIP_AI: ${{ contains(fromJSON('["Monday","Thursday"]'), steps.get-day.outputs.day) && 'false' || 'true' }}
        run: python screening.py

      - name: Copy result to public
        run: |
          mkdir -p screening-ui/public
          cp screening-ui/screening_result.json screening-ui/public/screening_result.json
          if [ -f screening-ui/screening_result_finance.json ]; then
            cp screening-ui/screening_result_finance.json screening-ui/public/screening_result_finance.json
          fi

      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git add screening-ui/screening_result.json screening-ui/public/screening_result.json
          git add -f screening-ui/screening_result_finance.json screening-ui/public/screening_result_finance.json 2>/dev/null || true
          git add -f screening-ui/ai_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update screening result $(date +'%Y-%m-%d')"
          git push
